version: 2

pull-request-branch-name:
  separator: "-"

multi-ecosystem-groups:
  all-dependencies:
    schedule:
      interval: "weekly"
      day: "friday"
      time: "17:00"
      timezone: "Europe/Zurich"
    labels:
      - "dependencies"

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    patterns: ["*"]
    multi-ecosystem-group: "all-dependencies"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "chore"
      include: "scope"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    cooldown:
      default-days: 7

  - package-ecosystem: "gomod"
    directory: "/backend"
    patterns: ["*"]
    multi-ecosystem-group: "all-dependencies"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "chore"
      include: "scope"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    cooldown:
      default-days: 7

  - package-ecosystem: "npm"
    directories:
      - "/frontend"
      - "/tests"
      - "/email-templates"
    patterns: ["*"]
    multi-ecosystem-group: "all-dependencies"
    versioning-strategy: "increase-if-necessary"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "chore"
      include: "scope"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    cooldown:
      default-days: 7

  - package-ecosystem: "docker"
    directories:
      - "/docker"
      - "/tests/setup"
    patterns: ["*"]
    multi-ecosystem-group: "all-dependencies"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "chore"
      include: "scope"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    cooldown:
      default-days: 7

  - package-ecosystem: "docker-compose"
    directories:
      - "/"
      - "/tests/setup"
    patterns: ["*"]
    multi-ecosystem-group: "all-dependencies"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "chore"
      include: "scope"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    cooldown:
      default-days: 7

  - package-ecosystem: "devcontainers"
    directory: "/"
    patterns: ["*"]
    multi-ecosystem-group: "all-dependencies"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "chore"
      include: "scope"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    cooldown:
      default-days: 7
